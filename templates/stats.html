{% extends "layout.html" %}

{% block title %}
    Stats
{% endblock %}

{% block main %}

    <h1>Stats</h1>
    <p class="mb-5">You can track your study time here:</p>


    <table class="table table-striped">
        <thead>
            <tr>
                <th scope="col">Subject</th>
                <th scope="col">Total Minutes</th>
            </tr>
        </thead>
        <tbody>
            {% for row in data %}
            <tr>
                <td>{{ row.subject }}</td>
                <td>{{ row.total_minutes | round(2)}} min</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- <p class="mb-5 mt-5">You can also see your history here: <a href="/history"><button class="beautiful-button">History</button></a></p> -->
{% endblock %}
